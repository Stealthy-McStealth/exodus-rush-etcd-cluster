apiVersion: v1
kind: Service
metadata:
  name: etcd-cluster
  namespace: passover
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 2379
    targetPort: 2379
    name: client
  - port: 2380
    targetPort: 2380
    name: peer
  selector:
    app: etcd-cluster
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-cluster-client
  namespace: passover
spec:
  type: ClusterIP
  ports:
  - port: 2379
    targetPort: 2379
    name: client
  selector:
    app: etcd-cluster
